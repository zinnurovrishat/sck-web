<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СЦК — Стерлитамакский центр комплектации</title>
    <meta name="description" content="Комплектация стройплощадок за 1 день. Шлакоблоки, кирпич, цемент, кладочная сетка. Доставка по Стерлитамаку и Югу Башкирии." />
    <script>
      window.__tgAuthData = null;
      window.__tgAuthDispatch = null;
      window.onTelegramAuth = function(data) {
        console.log('[TG early] onTelegramAuth fired', data);
        if (typeof window.__tgAuthDispatch === 'function') {
          window.__tgAuthDispatch(data);
        } else {
          window.__tgAuthData = data;
        }
      };
      // Debug: catch ALL postMessage events to see what Telegram widget sends
      window.addEventListener('message', function(e) {
        console.log('[MSG]', e.origin, typeof e.data === 'string' ? e.data.slice(0, 200) : JSON.stringify(e.data).slice(0, 200));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
