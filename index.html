    <!-- Telegram Auth helper -->
    <script>
      window.__tgAuthData = null;
      window.__tgAuthDispatch = null;
      window.onTelegramAuth = function(data) {
        if (typeof window.__tgAuthDispatch === 'function') {
          window.__tgAuthDispatch(data);
        } else {
          window.__tgAuthData = data;
        }
      };
      // Intercept Telegram auth_user postMessage directly
      // (telegram-widget.js does not always call window.onTelegramAuth reliably)
      window.addEventListener('message', function(e) {
        if (e.origin !== 'https://oauth.telegram.org') return;
        try {
          var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
          if (data && data.event === 'auth_user' && data.auth_data) {
            window.onTelegramAuth(data.auth_data);
          }
        } catch (_) {}
