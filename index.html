<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СЦК — Стерлитамакский центр комплектации</title>
    <meta name="description" content="Комплектация стройплощадок за 1 день. Шлакоблоки, кирпич, цемент, кладочная сетка. Доставка по Стерлитамаку и Югу Башкирии." />
    <script>
      window.__tgAuthData = null;
      window.__tgAuthDispatch = null;
      window.onTelegramAuth = function(data) {
        console.log('[TG early] onTelegramAuth fired', data);
        if (typeof window.__tgAuthDispatch === 'function') {
          window.__tgAuthDispatch(data);
        } else {
          window.__tgAuthData = data;
        }
      };
      // Intercept Telegram auth_user postMessage directly
      // (telegram-widget.js does not reliably call window.onTelegramAuth in all cases)
      window.addEventListener('message', function(e) {
        if (e.origin !== 'https://oauth.telegram.org') return;
        try {
          var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
          if (data && data.event === 'auth_user' && data.auth_data) {
            console.log('[TG] postMessage auth_user received', data.auth_data);
            window.onTelegramAuth(data.auth_data);
          }
        } catch (err) {
          console.error('[TG] postMessage parse error', err);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
